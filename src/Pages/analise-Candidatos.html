<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/analise-Candidatos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Análise de Candidatos - Projeto Resgate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div id="app" class="container-app">
        <!-- Barra Lateral -->
        <aside id="barra-lateral" class="barra-lateral">
            <div class="logo-barra-lateral">
                <i class="bi bi-heart-pulse-fill" style="color: #1A56DB; font-size: 1.5rem; margin-right: 8px;"></i> Projeto Resgate
            </div>
            <nav class="navegacao-barra-lateral">
                <ul id="menu-navegacao">
                    <li>
                        <a href="landing_page.html" id="link-inicio">
                            <i class="bi bi-house fs-5 me-2"></i>
                            Início
                        </a>
                    </li>
                    <li>
                        <a href="projetos.html" id="link-explorar">
                            <i class="bi bi-search fs-5 me-2"></i>
                            Explorar Projetos
                        </a>
                    </li>
                    <li class="ativo">
                        <a href="painel-Instituicao.html" id="link-painel-instituicao">
                            <i class="bi bi-person-badge fs-5 me-2"></i>
                            Painel da Instituição
                        </a>
                    </li>
                    <li>
                        <a href="painel-Instituicao.html#lista-projetos-vinculados" id="link-meus-projetos">
                            <i class="bi bi-check-circle fs-5 me-2"></i>
                            Meus Projetos
                        </a>
                    </li>
                    <li>
                        <a href="cadastro-projeto.html" id="link-criar-projeto">
                            <i class="bi bi-plus-circle fs-5 me-2"></i>
                            Criar Projeto
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="rodape-barra-lateral">
                <a href="#" onclick="Auth.sair(); return false;" id="link-sair-conta" class="link-sair">
                    <i class="bi bi-box-arrow-right fs-5 me-2"></i>
                    Sair da Conta
                </a>
            </div>
        </aside>

        <!-- Conteudo Principal -->
        <div class="conteudo-principal">
            <!-- Barra Superior -->
            <header class="barra-superior">
                <div class="barra-busca">
                    <i class="bi bi-search fs-5 text-secondary"></i>
                    <input type="text" id="input-busca" placeholder="Buscar projetos, instituições ou voluntários...">
                </div>
                <div class="acoes-barra-superior">
                    <a href="cadastro-projeto.html" id="btn-novo-projeto-topo" class="btn-primario" style="text-decoration: none;">Novo Projeto</a>
                    <div id="perfil-usuario-topo" class="perfil-usuario">
                        <div class="info-usuario">
                            <span id="nome-usuario-logado" class="nome-usuario">JSON JS</span>
                            <span class="funcao-usuario">Instituição</span>
                        </div>
                        <div class="avatar-usuario">
                            <i class="bi bi-building fs-5"></i>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Conteudo da Pagina -->
            <main id="conteudo-pagina" class="conteudo-pagina">
                <div class="cabecalho-pagina">
                    <div class="titulo-pagina">
                        <h1>Análise de Candidatos</h1>
                        <p>Gerencie os candidatos de seus projetos</p>
                    </div>
                    <div class="migalhas-pao">
                        <span>Início</span> / <span class="ativo">Painel da Instituição</span>
                    </div>
                </div>

                <div id="lista-candidatos-analise">
                    <!-- Candidatos serão renderizados aqui -->
                </div>

            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../Js/database.js"></script>
    <script src="../Js/auth.js"></script>
    
    <script>
        const sessao = Auth.protegerRota();
        if (sessao && sessao.tipo !== 'ong') {
            window.location.href = "painel-Voluntario.html";
        }
        
        if (sessao) {
            document.getElementById('nome-usuario-logado').textContent = sessao.nome;
            
            const container = document.getElementById('lista-candidatos-analise');
            const projetosDaOng = Database.obterProjetosPorOng(sessao.id);
            const idsProjetos = projetosDaOng.map(p => p.id);
            
            const todasCandidaturas = Database.obterCandidaturas();
            const candidaturasParaOng = todasCandidaturas.filter(c => idsProjetos.includes(c.id_projeto) && (!c.status || c.status === 'Pendente'));
            
            if (candidaturasParaOng.length === 0) {
                container.innerHTML = '<p style="padding:20px; color:#6b7280; text-align:center;">Não há candidaturas pendentes no momento.</p>';
            } else {
                let html = '';
                candidaturasParaOng.forEach(cand => {
                    const projeto = projetosDaOng.find(p => p.id === cand.id_projeto);
                    const volObj = Database.obterVoluntarios().find(v => v.id === cand.id_voluntario);
                    const nomeVol = volObj ? volObj.nome : 'Voluntário Desconhecido';
                    const emailVol = volObj ? volObj.email : '';
                    
                    html += `
                    <div class="info-projeto-analise" style="margin-top: 30px;">
                        <div class="icone-projeto-analise">
                            <i class="bi bi-heart-fill" style="color: #1A56DB; font-size: 1.5rem;"></i>
                        </div>
                        <h2>Projeto: ${projeto ? projeto.titulo : 'Desconhecido'}</h2>
                    </div>

                    <div class="cartao-candidato" id="candidatura-${cand.id}">
                        <div class="secao-candidato">
                            <div class="acoes-candidato">
                                <button class="btn-aprovar" onclick="atualizarStatus(${cand.id}, 'Aprovado')">
                                    <i class="bi bi-check-circle me-1"></i> Aprovar Candidato
                                </button>
                                <button class="btn-recusar" onclick="atualizarStatus(${cand.id}, 'Recusado')">
                                    <i class="bi bi-x-circle me-1"></i> Recusar Candidato
                                </button>
                            </div>

                            <div class="conteudo-dados">
                                <div class="dados-cadastrais-grid">
                                    <h3 class="titulo-secao-interna" style="grid-column: 1 / -1; margin-bottom: 0;">Dados Cadastrais</h3>
                                    <div class="grupo-dado">
                                        <label>Nome completo</label>
                                        <input type="text" value="${nomeVol}" readonly>
                                    </div>
                                    <div class="grupo-dado">
                                        <label>E-mail</label>
                                        <input type="email" value="${emailVol}" readonly>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            }
        }
        
        function atualizarStatus(idCandidatura, status) {
            Database.atualizarStatusCandidatura(idCandidatura, status);
            const el = document.getElementById('candidatura-' + idCandidatura);
            if(el) {
                el.innerHTML = '<p style="padding:20px; color:#047857;">Status atualizado para: ' + status + '</p>';
            }
        }
    </script>
</body>

</html>
