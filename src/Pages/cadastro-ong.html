<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Organização - Projeto Resgate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #F9FAFB;
            color: #1E3A5F;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header de Navegação Público ── */
        .header-publico {
            background-color: #1E3A5F;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-publico .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .header-publico .logo-area img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .header-publico .logo-area span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .header-publico nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-left: 24px;
            transition: color 0.2s;
        }

        .header-publico nav a:hover { color: white; }

        .header-publico nav a.btn-entrar {
            background-color: #1A56DB;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
        }

        .header-publico nav a.btn-entrar:hover { background-color: #1245b5; }

        /* ── Conteúdo ── */
        .pagina-conteudo {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
        }

        .card-formulario {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.08);
            width: 100%;
            max-width: 580px;
            padding: 40px;
        }

        .icone-topo {
            width: 52px;
            height: 52px;
            background-color: #e6f7ed;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .icone-topo img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        h1.titulo-form {
            font-size: 22px;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 6px;
        }

        .subtitulo-form {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 28px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #1E3A5F;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: #1E3A5F;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #057A55;
            box-shadow: 0 0 0 3px rgba(5, 122, 85, 0.12);
            outline: none;
        }

        .btn-cadastrar {
            width: 100%;
            padding: 13px;
            background-color: #057A55;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-cadastrar:hover {
            background-color: #046644;
            transform: translateY(-1px);
        }

        .rodape-form {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6B7280;
        }

        .rodape-form a {
            color: #057A55;
            font-weight: 600;
            text-decoration: none;
        }

        .rodape-form a:hover { text-decoration: underline; }

        .badge-mock {
            display: inline-block;
            background-color: #fef3c7;
            color: #92400e;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #fde68a;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <!-- Header de Navegação Público -->
    <header class="header-publico">
        <a href="landing_page.html" class="logo-area">
            <i class="bi bi-heart-pulse-fill" style="color: white; font-size: 1.5rem;"></i>
            <span>Projeto Resgate</span>
        </a>
        <nav>
            <a href="landing_page.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="projetos.html">Projetos</a>
            <a href="contato.html">Contato</a>
            <a href="cadastro.html" class="btn-entrar">Entrar</a>
        </nav>
    </header>

    <!-- Formulário de Cadastro -->
    <div class="pagina-conteudo">
        <div class="card-formulario">
            <div class="icone-topo">
                <i class="bi bi-building-fill" style="color: #057A55; font-size: 1.8rem;"></i>
            </div>



            <h1 class="titulo-form">Cadastrar Organização / ONG</h1>
            <p class="subtitulo-form">Registre sua instituição e conecte-se com voluntários engajados dispostos a ajudar.</p>

            <form id="form-cadastro-ong">
                <div class="row g-3">
                    <div class="col-12">
                        <label for="nome-ong" class="form-label">Nome da Organização</label>
                        <input id="nome-ong" name="nome-ong" type="text" class="form-control" placeholder="Nome oficial da ONG ou projeto social" required>
                    </div>

                    <div class="col-md-6">
                        <label for="cnpj" class="form-label">CNPJ</label>
                        <input id="cnpj" name="cnpj" type="text" class="form-control" placeholder="00.000.000/0000-00" required>
                    </div>

                    <div class="col-md-6">
                        <label for="causa-ong" class="form-label">Foco de Atuação</label>
                        <select id="causa-ong" name="causa-ong" class="form-select">
                            <option value="educacao">Educação / Cursos</option>
                            <option value="sustentabilidade">Sustentabilidade</option>
                            <option value="inclusao">Inclusão Social</option>
                            <option value="fome">Combate à Fome</option>
                            <option value="saude">Saúde e Bem-estar</option>
                            <option value="geral">Geral / Multiação</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label for="responsavel" class="form-label">Nome do Responsável</label>
                        <input id="responsavel" name="responsavel" type="text" class="form-control" placeholder="Nome completo do administrador da conta" required>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">E-mail de Contato</label>
                        <input id="email" name="email" type="email" class="form-control" placeholder="contato@ong.org.br" required>
                    </div>

                    <div class="col-md-6">
                        <label for="localizacao" class="form-label">Cidade / UF</label>
                        <input id="localizacao" name="localizacao" type="text" class="form-control" placeholder="Ex: Belo Horizonte, MG" required>
                    </div>

                    <div class="col-12">
                        <label for="senha" class="form-label">Senha de Acesso</label>
                        <input id="senha" name="senha" type="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="col-12 mt-2">
                        <button type="submit" class="btn-cadastrar">Cadastrar Instituição e Entrar →</button>
                    </div>
                </div>
            </form>

            <div class="rodape-form">
                Já tem uma conta? <a href="cadastro.html" style="color: #1A56DB;">Fazer login</a>
            </div>
            <div class="rodape-form mt-2">
                É voluntário? <a href="cadastro-voluntario.html" style="color: #1A56DB;">Cadastre-se aqui</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../Js/database.js"></script>
    <script src="../Js/auth.js"></script>
    <script>
        document.getElementById('form-cadastro-ong').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome-ong').value.trim();
            const cnpj = document.getElementById('cnpj').value.trim();
            const causa = document.getElementById('causa-ong').value.trim();
            const responsavel = document.getElementById('responsavel').value.trim();
            const email = document.getElementById('email').value.trim();
            const localizacao = document.getElementById('localizacao').value.trim();
            const senha = document.getElementById('senha').value.trim();
            
            if (!nome || !cnpj || !responsavel || !email || !localizacao || !senha) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
            
            if (Database.obterOngPorEmailOuCnpj(email) || Database.obterOngPorEmailOuCnpj(cnpj)) {
                alert('Este E-mail ou CNPJ já está cadastrado em outra Instituição. Tente fazer login.');
                return;
            }
            
            const ong = {
                nome: nome,
                cnpj: cnpj,
                causa: causa,
                responsavel: responsavel,
                email: email,
                localizacao: localizacao,
                senha: senha
            };
            
            const salva = Database.salvarOng(ong);
            alert('Instituição cadastrada com sucesso!');
            Auth.iniciarSessao('ong', salva);
            window.location.href = "painel-Instituicao.html";
        });
    </script>
</body>

</html>
